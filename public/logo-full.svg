<svg width="320" height="64" viewBox="0 0 320 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AutoLabels.io">
  <defs>
    <linearGradient id="alFullGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#0B2041"/>
    </linearGradient>
  </defs>
  <!-- Mark -->
  <rect width="64" height="64" rx="14" fill="url(#alFullGrad)"/>
  <path d="M 18 48 L 32 16 L 46 48" stroke="white" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="24" y1="38" x2="40" y2="38" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
  <circle cx="32" cy="16" r="3.5" fill="white"/>

  <!-- Two-tone wordmark: auto (Autocurb blue) + (LABELS) (Label Navy) -->

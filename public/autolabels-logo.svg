<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 80" width="340" height="80" role="img" aria-label="AutoLabels.io">
  <defs>
    <linearGradient id="alLockup" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#0B2041"/>
    </linearGradient>
  </defs>
  <!-- Mark -->
  <g transform="translate(0 8)">
    <rect width="64" height="64" rx="14" fill="url(#alLockup)"/>
    <path d="M 18 48 L 32 16 L 46 48" stroke="white" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="24" y1="38" x2="40" y2="38" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
    <circle cx="32" cy="16" r="3.5" fill="white"/>
  </g>

  <!-- Two-tone wordmark: Auto (Label Navy) + Labels (Autocurb blue) -->
  <text x="84" y="46" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="800" letter-spacing="-0.02em">
    <tspan fill="#0B2041">Auto</tspan><tspan fill="#2563EB">Labels</tspan><tspan fill="#2563EB" fill-opacity="0.85">.io</tspan>
  </text>
  <!-- Tagline -->
  <text x="86" y="68" font-family="Inter, system-ui, sans-serif" font-size="10.5" font-weight="700" fill="#64748B" letter-spacing="0.24em">CLEAR.  COMPLIANT.  CONSISTENT.</text>
</svg>

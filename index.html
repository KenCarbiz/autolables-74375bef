    <!-- FAQPage markup mirrors the VISIBLE FAQ on the landing page (Google
         requires the two to match). Update both together. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {"@type":"Question","name":"When does AutoLabels launch?","acceptedAnswer":{"@type":"Answer","text":"We're in pilot now with select dealer groups. General availability rolls out through 2026. Early-access dealers get first access and locked-in early pricing."}},
          {"@type":"Question","name":"Is this FTC compliant?","acceptedAnswer":{"@type":"Answer","text":"The FTC CARS Rule was vacated by the 5th Circuit in January 2025. We build to the underlying FTC Section 5 framework, 16 CFR Part 455, the Monroney Act, E-SIGN/UETA, and California SB 766 (effective October 2026). AutoLabels documents your compliance posture — it does not provide legal advice."}},
          {"@type":"Question","name":"What does it replace?","acceptedAnswer":{"@type":"Answer","text":"Your sticker printer, addendum builder, Buyers Guide template, and signing pad — plus the spreadsheet you use to reconcile site prices to lot prices."}},
          {"@type":"Question","name":"Where does my vehicle data come from?","acceptedAnswer":{"@type":"Answer","text":"Either your existing inventory feed, or our nightly inventory and advertised-price update that pulls your live listings and site pricing. Nothing to install or swap — your vehicles and prices flow in automatically."}},
          {"@type":"Question","name":"What happens after I request early access?","acceptedAnswer":{"@type":"Answer","text":"We review your dealership information and follow up within one business day. Then it's three steps: review your store, brands, and volume; configure templates, disclosures, and your inventory feed; and onboard your team hands-on. Requesting access is free and requires no card."}},
          {"@type":"Question","name":"Is there a long-term contract?","acceptedAnswer":{"@type":"Answer","text":"No. Early-access pricing is month-to-month, per rooftop. Joining the early-access list costs nothing and locks your launch pricing."}},
          {"@type":"Question","name":"How does my inventory get in? Which DMS or feed providers work?","acceptedAnswer":{"@type":"Answer","text":"Three paths: your existing inventory feed (vAuto, VinSolutions, CDK, Reynolds, and generic feeds via DMS webhooks on Compliance Pro), a CSV import, or our nightly website sync that reads your live listings directly — no IT project required."}}
        ]
      }
    </script>
